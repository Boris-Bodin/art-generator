[project]
name = "art-generator"
version = "0.1.0"
description = "Moteur d'art generatif base sur des equations parametriques."
requires-python = ">=3.12"
dependencies = [
    "numpy>=2.0",
    "pillow>=10.0",
]

[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["art_generator*"]